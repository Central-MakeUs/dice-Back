spring:
  application:
    name: "dice-server"

project:
  version: 0.0.1

jwt:
  secret:
    access: ${JWT_ACCESS_SECRET}
    refresh: ${JWT_REFRESH_SECRET}

logging:
  level:
    org.springframework.jdbc.core: TRACE
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:13306/dice?serverTimezone=UTC&characterEncoding=UTF-8
    username: dice
    password: backend
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        auto_quote_keyword: false
        globally_quoted_identifiers: false
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

  mail:
    host: smtp.gmail.com
    port: 587
    username: dice.minipop@gmail.com
    password: pche cfpt iibx fkuv
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true

cloud:
  aws:
    s3:
      bucket: cmc-dice-bucket
    credentials:
      access-key: ${CLOUD_ACCESS_KEY}
      secret-key: ${CLOUD_SECRET_KEY}
    region:
      static: ap-northeast-2
    stack:
      auto: false

fcm:
  certification: ${FCM_CERTIFICATION}
  file-path: ${FCM_PATH}
  url: ${FCM_URL}
  google_api: ${FCM_GOOGLE_API}
  project_id: ${FCM_PROJECT_ID}
